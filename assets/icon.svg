<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- termEd app icon: a terminal window wearing Ed's glasses.
       Master source; render with scripts/make-icons.mjs. All shapes are
       paths (no text elements), so any SVG renderer produces the same image. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2038"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a63047"/>
      <stop offset="1" stop-color="#701c30"/>
    </linearGradient>
    <linearGradient id="stache" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a8b7e"/>
      <stop offset="1" stop-color="#645a52"/>
    </linearGradient>
  </defs>

  <!-- window body -->
  <rect x="44" y="44" width="936" height="936" rx="196" fill="url(#bg)"/>

  <!-- window border -->
  <rect x="47" y="47" width="930" height="930" rx="193" fill="none" stroke="#78c8ff" stroke-opacity="0.4" stroke-width="6"/>

  <!-- glasses: temple arms -->
  <path d="M 190 430 L 96 398" stroke="url(#frame)" stroke-width="26" stroke-linecap="round" fill="none"/>
  <path d="M 834 430 L 928 398" stroke="url(#frame)" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- lenses -->
  <circle cx="340" cy="430" r="150" fill="#151a2e"/>
  <circle cx="684" cy="430" r="150" fill="#151a2e"/>
  <circle cx="340" cy="430" r="150" fill="#6fc3ff" opacity="0.08"/>
  <circle cx="684" cy="430" r="150" fill="#6fc3ff" opacity="0.08"/>

  <!-- happy closed eyes -->
  <path d="M 268 462 Q 340 396 412 462" stroke="#cfd8ff" stroke-width="24" stroke-linecap="round" fill="none"/>
  <path d="M 612 462 Q 684 396 756 462" stroke="#cfd8ff" stroke-width="24" stroke-linecap="round" fill="none"/>

  <!-- lens highlights -->
  <path d="M 245 370 Q 275 315 330 297" stroke="#ffffff" stroke-opacity="0.30" stroke-width="18" stroke-linecap="round" fill="none"/>
  <path d="M 589 370 Q 619 315 674 297" stroke="#ffffff" stroke-opacity="0.30" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- frames + bridge -->
  <circle cx="340" cy="430" r="150" fill="none" stroke="url(#frame)" stroke-width="30"/>
  <circle cx="684" cy="430" r="150" fill="none" stroke="url(#frame)" stroke-width="30"/>
  <path d="M 483 402 Q 512 372 541 402" stroke="url(#frame)" stroke-width="26" stroke-linecap="round" fill="none"/>

  <!-- grin -->
  <path d="M 402 636 Q 512 686 622 636 Q 618 726 512 740 Q 406 726 402 636 Z" fill="#f4f1ec"/>
  <path d="M 470 668 L 466 726 M 554 668 L 558 726" stroke="#d8d2c8" stroke-width="8" stroke-linecap="round"/>

  <!-- mustache (over top of grin) -->
  <path d="M 512 600 C 460 578 410 582 376 604 C 342 628 338 656 362 666 C 402 682 468 666 512 632 C 556 666 622 682 662 666 C 686 656 682 628 648 604 C 614 582 564 578 512 600 Z" fill="url(#stache)"/>

  <!-- prompt line: > ed █  (drawn as geometric paths, monospace style) -->
  <path d="M 126 794 L 202 848 L 126 902" stroke="#6fc3ff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- e (bowl open at lower right) -->
  <path d="M 324 891 A 52 52 0 1 1 348 859" fill="none" stroke="#eef2ff" stroke-width="28" stroke-linecap="round"/>
  <path d="M 250 848 L 348 848" stroke="#eef2ff" stroke-width="26" stroke-linecap="round"/>
  <!-- d -->
  <circle cx="440" cy="846" r="52" fill="none" stroke="#eef2ff" stroke-width="28"/>
  <path d="M 492 758 L 492 898" stroke="#eef2ff" stroke-width="28" stroke-linecap="round"/>
  <!-- block cursor -->
  <rect x="560" y="788" width="62" height="118" fill="#6fc3ff"/>
</svg>
